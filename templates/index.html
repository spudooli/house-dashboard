    function storeTempReading(key, raw) {
      const v = parseFloat(raw);
      if (isNaN(v)) return;
      const history = JSON.parse(localStorage.getItem(key) || '[]');
      history.push({ t: Date.now(), v });
      if (history.length > 144) history.splice(0, history.length - 144);
      localStorage.setItem(key, JSON.stringify(history));
    }

    function renderTempChart(anchorId, canvasId, storageKey, minTemp, maxTemp) {
      const history = JSON.parse(localStorage.getItem(storageKey) || '[]');
      if (history.length < 2) return;
      const li = document.getElementById(anchorId).closest('li');
      let canvas = document.getElementById(canvasId);
      if (!canvas) {
        canvas = document.createElement('canvas');
        canvas.id = canvasId;
        canvas.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none;opacity:0.25;z-index:0';
        li.style.position = 'relative';
        li.insertBefore(canvas, li.firstChild);
      }
      const marginH = 24;
      canvas.style.left = marginH + 'px';
      canvas.width = li.offsetWidth - marginH * 2;
      canvas.height = li.offsetHeight;
      const w = canvas.width, h = canvas.height;
      const chartTop = h / 4, chartH = h / 2;
      const range = maxTemp - minTemp;
      const pts = history.map((d, i) => ({
        x: (i / (history.length - 1)) * w,
        y: chartTop + chartH - ((d.v - minTemp) / range) * chartH,
      }));
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, w, h);
      ctx.strokeStyle = '#D0E700';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      for (let i = 1; i < pts.length; i++) {
        const p0 = pts[Math.max(0, i - 2)];
        const p1 = pts[i - 1];
        const p2 = pts[i];
        const p3 = pts[Math.min(pts.length - 1, i + 1)];
        ctx.bezierCurveTo(
          p1.x + (p2.x - p0.x) / 6, p1.y + (p2.y - p0.y) / 6,
          p2.x - (p3.x - p1.x) / 6, p2.y - (p3.y - p1.y) / 6,
          p2.x, p2.y
        );
      }
      ctx.stroke();
    }

    function bankbalancehistory() {
      fetch('bankbalancehistory').then(r => r.text()).then(data => {
        const values = data.split(',').map(Number);
        const container = document.getElementById('bankbalancehistory');
        container.innerHTML = '';
        const h = 20;
        const canvas = document.createElement('canvas');
        canvas.style.display = 'block';
        canvas.style.width = '100%';
        canvas.height = h;
        container.appendChild(canvas);
        const w = canvas.offsetWidth;
        canvas.width = w;
        const barWidth = Math.floor(w / values.length);
        const ctx = canvas.getContext('2d');
        const min = Math.min(0, ...values);
        const max = Math.max(0, ...values);
        const range = max - min || 1;
        const zeroY = Math.round((max / range) * h);
        values.forEach((v, i) => {
          const barH = Math.max(1, Math.abs(Math.round((v / range) * h)));
          const y = v >= 0 ? zeroY - barH : zeroY;
          ctx.fillStyle = v >= 0 ? '#D0E700' : '#FF4444';
          ctx.fillRect(i * barWidth, y, barWidth - 1, barH);
        });
      });
    }
